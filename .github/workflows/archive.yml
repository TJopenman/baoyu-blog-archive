name: Daily Archive baoyu.io/blog

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 python-slugify markdownify

      - name: Run archive script
        run: python scripts/archive_blog.py

      - name: Commit & Push changes
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          
          # 关键修复：容错添加文件（无变更时不报错）
          git add content/ archived.json 2>/dev/null || true
          
          if git diff --staged --quiet; then
            echo "✅ No new articles to commit"
          else
            git commit -m "chore: auto archive new posts from baoyu.io/blog ($(date +%Y-%m-%d))"
            git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git
            git push
            echo "✅ Successfully pushed new articles"
          fi
