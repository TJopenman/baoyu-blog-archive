name: Daily Archive baoyu.io/blog

on:
  schedule:
    # UTC 02:00，每天一次（对应北京时间 10:00）
    - cron: '0 2 * * *'

  workflow_dispatch:   # 支持手动触发测试

jobs:
  archive:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}   # 需要有 repo + workflow 权限

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 python-slugify

      - name: Run archive script
        run: python scripts/archive_blog.py

      - name: Commit & Push changes (if any)
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          
          git add content/ archived.json
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto archive new articles from baoyu.io/blog ($(date +%Y-%m-%d))"
            git push
          fi
